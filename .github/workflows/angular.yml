# Nombre del workflow que aparecerá en GitHub Actions
name: Angular PWA CI

# Ejecuta el pipeline cuando se envían cambios o pull requests a main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    # Ejecuta el mismo trabajo con Node.js 20 y 22
    strategy:
      matrix:
        node-version: [20, 22]

    runs-on: ubuntu-latest

    steps:
      # Descarga el código del repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # Configura la versión de Node.js correspondiente a la matriz
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Instala las dependencias del proyecto
      - name: Install
        run: npm ci

      # Ejecuta las pruebas una sola vez
      - name: Test
        run: npm test -- --run

      # Compila la aplicación Angular
      - name: Build
        run: npm run build